alipay.private-key=${ALIPAY_PRIVATE_KEY:}
alipay.public-key=${ALIPAY_PUBLIC_KEY:}

# ??????
wechat.app-id=${WECHAT_APP_ID:wx0000000000000000}
wechat.mch-id=${WECHAT_MCH_ID:1000000000}
