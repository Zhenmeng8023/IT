# ??????
payment.callback-domain=${PAYMENT_CALLBACK_DOMAIN:http://localhost:18080}

# ????
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ?????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/it9_data?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPAéç½®
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.generate-ddl=false

# ????
logging.level.root=info
logging.level.com.alikeyou=debug
# ?? Hibernate SQL ??
spring.jpa.show-sql=false
# ?? Hibernate ????? WARN????????????
logging.level.org.hibernate=WARN
# ????????????????? SQL ???????
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=WARN

# ???????
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Spring AI Ollama ????
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${SPRING_AI_OLLAMA_CHAT_MODEL:qwen3.5:latest}
spring.ai.ollama.chat.temperature=${SPRING_AI_OLLAMA_CHAT_TEMPERATURE:0.7}
spring.ai.ollama.chat.max-tokens=${SPRING_AI_OLLAMA_CHAT_MAX_TOKENS:2048}
spring.ai.ollama.chat.enable=${SPRING_AI_OLLAMA_CHAT_ENABLE:true}

# ????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=10MB
# Keep Tomcat from resetting larger multipart uploads before Spring can return
# a normal JSON error response.
server.tomcat.max-swallow-size=500MB
server.tomcat.max-http-form-post-size=500MB
app.ai.knowledge-document.storage-root=./runtime/knowledge-documents

# 真实 embedding 推荐至少配置这两项
# 你的知识库里 embedding_provider 建议填: ollama
# 你的知识库里 embedding_model 建议填: embeddinggemma 或 qwen3-embedding

ai.embedding.default-provider=${AI_EMBEDDING_DEFAULT_PROVIDER:ollama}
ai.embedding.default-model=${AI_EMBEDDING_DEFAULT_MODEL:embeddinggemma:300m}
ai.embedding.ollama.base-url=${AI_EMBEDDING_OLLAMA_BASE_URL:http://127.0.0.1:11434}
ai.embedding.ollama.keep-alive=${AI_EMBEDDING_OLLAMA_KEEP_ALIVE:30m}

# 如果你后面要接 OpenAI 兼容 embedding 服务，再打开下面这些
# ai.embedding.openai.base-url=https://your-host
# ai.embedding.openai.api-key=your-api-key
# ai.embedding.openai.embeddings-path=/v1/embeddings

ai.embedding.http.connect-timeout-ms=5000
ai.embedding.http.read-timeout-ms=120000

# AI chat provider defaults (used when ai_model.base_url / timeout_ms is empty)
ai.provider.ollama.base-url=${AI_PROVIDER_OLLAMA_BASE_URL:http://localhost:11434}
ai.provider.deepseek.base-url=${AI_PROVIDER_DEEPSEEK_BASE_URL:https://api.deepseek.com}
ai.provider.default-timeout-ms=${AI_PROVIDER_DEFAULT_TIMEOUT_MS:120000}

# AI RAG retrieval
ai.rag.default-top-k=5
ai.rag.max-top-k=20
ai.rag.max-vector-candidates=5000
ai.rag.max-keyword-candidates=1200
# RAG retrieval diagnostics log level
logging.level.com.alikeyou.itmoduleai.application.support.AiKnowledgeResolver=INFO

# AI stream/SSE timeout guard
spring.mvc.async.request-timeout=120000
spring.codec.max-in-memory-size=2MB
ai.sse.stream-include-usage=true

# Redis / Spring Session
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}
spring.session.store-type=redis
spring.session.timeout=${SPRING_SESSION_TIMEOUT:7d}
spring.session.redis.namespace=it-main:session
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=${SESSION_COOKIE_NAME:ITSESSIONID}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Security / CORS
app.security.allowed-origin-patterns=${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:18080,http://127.0.0.1:18080}
app.security.session.cookie-name=${SESSION_COOKIE_NAME:ITSESSIONID}
app.security.session.cookie-secure=${SESSION_COOKIE_SECURE:false}
app.security.session.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
app.security.session.cookie-max-age-seconds=${SESSION_COOKIE_MAX_AGE_SECONDS:604800}


