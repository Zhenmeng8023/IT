# Spring AI Ollama ????
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen3.5:latest
spring.ai.ollama.chat.temperature=0.7
spring.ai.ollama.chat.max-tokens=2048
spring.ai.ollama.chat.enable=true

# ????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=2MB
app.ai.knowledge-document.storage-root=./runtime/knowledge-documents

# 真实 embedding 推荐至少配置这两项
# 你的知识库里 embedding_provider 建议填: ollama
# 你的知识库里 embedding_model 建议填: embeddinggemma 或 qwen3-embedding

ai.embedding.default-provider=ollama
ai.embedding.default-model=embeddinggemma:300m
ai.embedding.ollama.base-url=http://127.0.0.1:11434
ai.embedding.ollama.keep-alive=30m

# 如果你后面要接 OpenAI 兼容 embedding 服务，再打开下面这些
# ai.embedding.openai.base-url=https://your-host
# ai.embedding.openai.api-key=your-api-key
# ai.embedding.openai.embeddings-path=/v1/embeddings

ai.embedding.http.connect-timeout-ms=5000
ai.embedding.http.read-timeout-ms=120000


